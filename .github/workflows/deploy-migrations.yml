name: Deploy migrations to production

# Runs `supabase db push` on every push to main so any new migration files
# under supabase/migrations/ are applied automatically. Also allows manual
# dispatch from the Actions tab.
#
# Required GitHub secrets:
#   - SUPABASE_ACCESS_TOKEN — Personal access token (https://supabase.com/dashboard/account/tokens)
#   - SUPABASE_DB_PASSWORD  — The database password for the linked project

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: uiyjmjibshnkhwewtkoz
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          encoded=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['SUPABASE_DB_PASSWORD'], safe=''))")
          supabase db push \
            --db-url "postgresql://postgres.uiyjmjibshnkhwewtkoz:${encoded}@aws-1-us-east-2.pooler.supabase.com:6543/postgres"
